<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrazyGames Clicker Edition</title>
    <!-- CrazyGames SDK v3 Integration -->
    <script src="https://crazygames.com"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background: radial-gradient(circle, #2e1a47 0%, #0d0714 100%); color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        #game-container { text-align: center; background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); width: 90%; max-width: 450px; }
        h1 { font-size: 2.2rem; margin-bottom: 5px; color: #ff5722; text-shadow: 0 0 10px rgba(255, 87, 34, 0.5); }
        .subtitle { font-size: 0.9rem; color: #aaa; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        #score-panel { font-size: 3rem; font-weight: bold; margin-bottom: 25px; color: #00ffcc; text-shadow: 0 0 15px rgba(0, 255, 204, 0.4); }
        #target-btn { width: 160px; height: 160px; border-radius: 50%; border: none; background: linear-gradient(135deg, #ff5722 0%, #ff9800 100%); font-size: 4rem; cursor: pointer; outline: none; box-shadow: 0 8px 25px rgba(255,87,34,0.4); transition: transform 0.05s ease, box-shadow 0.1s ease; margin-bottom: 30px; display: inline-flex; align-items: center; justify-content: center; }
        #target-btn:active { transform: scale(0.92); box-shadow: 0 4px 10px rgba(255,87,34,0.6); }
        .btn-panel { display: flex; flex-direction: column; gap: 12px; }
        button.action-btn { width: 100%; padding: 14px; font-size: 1rem; font-weight: bold; color: #fff; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s, transform 0.1s; }
        #ad-btn { background: #9c27b0; box-shadow: 0 4px 15px rgba(156, 39, 176, 0.3); }
        #ad-btn:hover { background: #ba68c8; }
        #ad-btn:disabled { background: #555; cursor: not-allowed; box-shadow: none; opacity: 0.6; }
        #reset-btn { background: rgba(255,255,255,0.1); color: #ccc; font-size: 0.85rem; padding: 8px; }
        #reset-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
        #status-msg { margin-top: 15px; font-size: 0.85rem; color: #00ffcc; min-height: 18px; font-style: italic; }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>CRAZY CLICKER</h1>
        <div class="subtitle">SDK Integration Template</div>
        
        <div id="score-panel">0</div>
        
        <button id="target-btn">🎮</button>
        
        <div class="btn-panel">
            <button id="ad-btn" class="action-btn">🎬 Watch Ad (Score +25)</button>
            <button id="reset-btn" class="action-btn">Reset Progress</button>
        </div>

        <div id="status-msg">Initializing SDK...</div>
    </div>

    <script>
        // State variables
        let score = 0;
        let crazySDK = null;

        // DOM elements
        const scoreDisplay = document.getElementById('score-panel');
        const targetBtn = document.getElementById('target-btn');
        const adBtn = document.getElementById('ad-btn');
        const resetBtn = document.getElementById('reset-btn');
        const statusMsg = document.getElementById('status-msg');

        // Load saved local data if available
        if (localStorage.getItem('crazy_clicker_score')) {
            score = parseInt(localStorage.getItem('crazy_clicker_score'), 10);
            updateUI();
        }

        // Initialize CrazyGames SDK safely
        window.addEventListener('DOMContentLoaded', async () => {
            if (window.CrazyGames && window.CrazyGames.SDK) {
                try {
                    crazySDK = window.CrazyGames.SDK;
                    statusMsg.innerText = "CrazyGames SDK active.";
                    // Signal to CrazyGames that the loading screen has finished
                    crazySDK.game.loadingStop();
                } catch (e) {
                    console.error("SDK initialization failure:", e);
                    statusMsg.innerText = "Running in Local Standalone Mode.";
                }
            } else {
                statusMsg.innerText = "Running in Local Standalone Mode.";
            }
        });

        // Core Game Mechanics
        targetBtn.addEventListener('click', () => {
            score += 1;
            updateUI();
            saveProgress();
            
            // Fire happy-path tracking element if SDK is active
            if (crazySDK) {
                crazySDK.game.gameplayStart();
            }
        });

        // SDK Midroll/Rewarded Advertisement Action Loop
        adBtn.addEventListener('click', () => {
            statusMsg.innerText = "Requesting advertisement stream...";
            adBtn.disabled = true;

            if (crazySDK) {
                // Execute Official CrazyGames Ad SDK Wrapper
                crazySDK.ad.requestAd("rewarded", {
                    adStarted: () => {
                        statusMsg.innerText = "Advertisement playing...";
                        console.log("Ad stream active.");
                    },
                    adFinished: () => {
                        score += 25;
                        updateUI();
                        saveProgress();
                        adBtn.disabled = false;
                        statusMsg.innerText = "Success! Earned +25 bonus points.";
                    },
                    adError: (error) => {
                        console.error("SDK Ad Window Error:", error);
                        adBtn.disabled = false;
                        statusMsg.innerText = "Ad failed to display. Try again.";
                    }
                });
            } else {
                // Local Sandbox Fallback Emulator Logic
                setTimeout(() => {
                    score += 25;
                    updateUI();
                    saveProgress();
                    adBtn.disabled = false;
                    statusMsg.innerText = "[Sandbox Mode] Mimicked Ad completed. +25 added.";
                }, 1500);
            }
        });

        // Reset tracking
        resetBtn.addEventListener('click', () => {
            if (confirm("Are you sure you want to reset your score?")) {
                score = 0;
                updateUI();
                saveProgress();
                statusMsg.innerText = "Progress wiped clean.";
            }
        });

        // Helper functions
        function updateUI() {
            scoreDisplay.innerText = score;
        }

        function saveProgress() {
            localStorage.setItem('crazy_clicker_score', score);
        }
    </script>
</body>
</html>
